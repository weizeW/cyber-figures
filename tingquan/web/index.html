<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听泉赏宝 · 万物皆可鉴</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0d0d1a;
  --bg-secondary: #1a1a2e;
  --bg-tertiary: #16213e;
  --bg-card: #1e1e36;
  --text-primary: #e8e8e8;
  --text-secondary: #a0a0b8;
  --text-muted: #6a6a80;
  --accent-gold: #d4a853;
  --accent-gold-dim: #a8842f;
  --accent-blue: #4a7dff;
  --accent-red: #e74c5f;
  --accent-green: #4caf50;
  --border-subtle: rgba(255,255,255,0.06);
  --glow-gold: rgba(212,168,83,0.15);
}

body {
  font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  line-height: 1.6;
}

/* ========== Top Bar ========== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: linear-gradient(180deg, rgba(30,30,54,0.98) 0%, rgba(13,13,26,0.95) 100%);
  border-bottom: 1px solid var(--border-subtle);
  position: relative;
  z-index: 100;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 10px;
}

.live-dot {
  width: 8px; height: 8px;
  background: var(--accent-red);
  border-radius: 50%;
  animation: pulse-dot 1.5s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--accent-red); }
  50% { opacity: 0.5; box-shadow: 0 0 12px var(--accent-red); }
}

.live-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 1px;
}

.live-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: 8px;
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.viewer-count {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-secondary);
}

.viewer-icon {
  width: 16px; height: 16px;
  fill: var(--accent-red);
}

.heat-bar {
  width: 60px; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
  margin-left: 4px;
}

.heat-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-gold), var(--accent-red));
  border-radius: 2px;
  animation: heat-pulse 3s ease-in-out infinite;
}

@keyframes heat-pulse {
  0%, 100% { width: 70%; }
  50% { width: 95%; }
}

/* Volume + Settings */
.vol-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.icon-btn {
  background: none;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  cursor: pointer;
  width: 32px; height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-size: 15px;
}

.icon-btn:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text-primary);
  border-color: rgba(255,255,255,0.12);
}

.icon-btn.active {
  color: var(--accent-gold);
  border-color: var(--accent-gold-dim);
}

.vol-slider {
  -webkit-appearance: none;
  width: 60px; height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  outline: none;
}

.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--accent-gold);
  border-radius: 50%;
  cursor: pointer;
}

/* ========== Main Layout ========== */
.main-container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 52px);
  position: relative;
}

/* ========== Danmaku Overlay ========== */
.danmaku-layer {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 180px;
  overflow: hidden;
  pointer-events: none;
  z-index: 50;
}

.danmaku-item {
  position: absolute;
  white-space: nowrap;
  font-size: 14px;
  font-weight: 500;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.8), 0 0 6px rgba(0,0,0,0.5);
  animation: danmaku-fly linear forwards;
  pointer-events: none;
  letter-spacing: 0.5px;
}

@keyframes danmaku-fly {
  from { transform: translateX(100vw); }
  to { transform: translateX(-100%); }
}

/* ========== Chat Area ========== */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 20px 10px;
  scroll-behavior: smooth;
  position: relative;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* Ambient glow */
.chat-area::before {
  content: '';
  position: fixed;
  top: 50%;
  left: 50%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, var(--glow-gold) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* Message Bubbles */
.msg {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  max-width: 85%;
  position: relative;
  z-index: 1;
  animation: msg-in 0.3s ease-out;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.assistant { align-self: flex-start; }
.msg.user { align-self: flex-end; margin-left: auto; flex-direction: row-reverse; }

.msg-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
}

.msg.assistant .msg-avatar {
  background: linear-gradient(135deg, #2a2a4a, #3a3a5a);
  border: 1.5px solid var(--accent-gold-dim);
  color: var(--accent-gold);
}

.msg.user .msg-avatar {
  background: linear-gradient(135deg, #1a3a6a, #2a4a8a);
  border: 1.5px solid rgba(74,125,255,0.4);
  color: var(--accent-blue);
}

.msg-content {
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 14.5px;
  line-height: 1.7;
  word-break: break-word;
}

.msg.assistant .msg-content {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-top-left-radius: 4px;
  color: var(--text-primary);
}

.msg.user .msg-content {
  background: linear-gradient(135deg, #1a3a7a, #2244aa);
  border-top-right-radius: 4px;
  color: #fff;
}

/* Typing indicator */
.typing-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 16px;
  color: var(--text-muted);
  font-size: 13px;
}

.typing-dots { display: flex; gap: 4px; }

.typing-dots span {
  width: 6px; height: 6px;
  background: var(--accent-gold-dim);
  border-radius: 50%;
  animation: typing-bounce 1.2s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Streaming cursor */
.stream-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent-gold);
  margin-left: 2px;
  animation: blink-cursor 0.8s steps(1) infinite;
  vertical-align: text-bottom;
}

@keyframes blink-cursor {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Inline expression images */
.expression-img {
  display: block;
  max-width: 200px;
  max-height: 200px;
  border-radius: 10px;
  margin: 8px 0;
  border: 1px solid var(--border-subtle);
}

/* User uploaded image preview in chat */
.user-img-preview {
  display: block;
  max-width: 240px;
  max-height: 240px;
  border-radius: 10px;
  margin: 4px 0;
}

/* ========== Certificate Card ========== */
.cert-card {
  background: linear-gradient(135deg, #1e1e36, #2a2a44);
  border-radius: 12px;
  padding: 20px;
  margin: 12px 0;
  position: relative;
  overflow: hidden;
  font-size: 13.5px;
  line-height: 1.8;
}

.cert-card.kaimen {
  border: 1.5px solid var(--accent-gold-dim);
  box-shadow: 0 0 20px var(--glow-gold), inset 0 0 30px rgba(212,168,83,0.05);
}

.cert-card.kaimen::before {
  content: '';
  position: absolute;
  top: -20px;
  right: -20px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(212,168,83,0.15), transparent 70%);
  pointer-events: none;
}

.cert-card.chendian {
  border: 1.5px solid rgba(120,120,140,0.3);
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.cert-header {
  text-align: center;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-subtle);
}

.cert-header h3 {
  font-size: 15px;
  letter-spacing: 3px;
}

.cert-card.kaimen .cert-header h3 { color: var(--accent-gold); }
.cert-card.chendian .cert-header h3 { color: var(--text-muted); }

.cert-body { color: var(--text-secondary); }
.cert-body .label { color: var(--text-muted); margin-right: 6px; }
.cert-body .value { color: var(--text-primary); }

.cert-stamp {
  position: absolute;
  bottom: 16px;
  right: 20px;
  font-size: 32px;
  font-weight: 900;
  opacity: 0.15;
  transform: rotate(-15deg);
  letter-spacing: 4px;
}

.cert-card.kaimen .cert-stamp { color: var(--accent-gold); }
.cert-card.chendian .cert-stamp { color: var(--accent-red); opacity: 0.2; }

.cert-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border-subtle);
}

.cert-btn {
  padding: 5px 12px;
  font-size: 12px;
  border-radius: 6px;
  border: 1px solid var(--border-subtle);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}

.cert-btn:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
}

/* ========== Input Area ========== */
.input-area {
  padding: 12px 20px 16px;
  background: linear-gradient(0deg, var(--bg-primary) 0%, rgba(13,13,26,0.95) 100%);
  border-top: 1px solid var(--border-subtle);
  position: relative;
  z-index: 60;
}

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  max-width: 900px;
  margin: 0 auto;
}

.input-wrapper {
  flex: 1;
  position: relative;
}

#chat-input {
  width: 100%;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  line-height: 1.5;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 44px;
  transition: border-color 0.2s;
}

#chat-input:focus {
  border-color: rgba(212,168,83,0.4);
}

#chat-input::placeholder {
  color: var(--text-muted);
}

.img-preview-container {
  display: none;
  position: relative;
  margin-bottom: 8px;
}

.img-preview-container.active { display: block; }

.img-preview-thumb {
  max-width: 120px;
  max-height: 80px;
  border-radius: 8px;
  border: 1px solid var(--border-subtle);
}

.img-preview-remove {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 20px;
  height: 20px;
  background: var(--accent-red);
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.action-btns { display: flex; gap: 8px; }

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent-gold-dim), var(--accent-gold));
  color: #1a1a2e;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.send-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--glow-gold); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

.upload-btn {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border-subtle);
  background: rgba(255,255,255,0.03);
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.upload-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }

#file-input { display: none; }

/* Drop zone overlay */
.drop-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13,13,26,0.85);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}

.drop-overlay.active { display: flex; }

.drop-overlay-text {
  font-size: 20px;
  color: var(--accent-gold);
  font-weight: 600;
}

.drop-overlay-sub {
  font-size: 14px;
  color: var(--text-muted);
}

/* ========== Settings Modal ========== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.active { display: flex; }

.modal-panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 16px;
  padding: 28px;
  width: 420px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.modal-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.modal-close:hover { color: var(--text-primary); }

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-select, .form-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-primary);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.form-select:focus, .form-input:focus {
  border-color: rgba(212,168,83,0.4);
}

.form-select option {
  background: var(--bg-primary);
  color: var(--text-primary);
}

.form-input[type="password"] {
  font-family: monospace;
  letter-spacing: 2px;
}

.form-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.save-btn {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, var(--accent-gold-dim), var(--accent-gold));
  border: none;
  border-radius: 8px;
  color: var(--bg-primary);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}

.save-btn:hover { box-shadow: 0 0 20px var(--glow-gold); }

.settings-status {
  text-align: center;
  font-size: 12px;
  color: var(--accent-green);
  margin-top: 8px;
  opacity: 0;
  transition: opacity 0.3s;
}

.settings-status.show { opacity: 1; }

/* Toast */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-primary);
  opacity: 0;
  transition: all 0.3s;
  z-index: 2000;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Bridge connection status */
.bridge-status {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
  margin-left: 8px;
}

.bridge-status.active { display: inline-flex; }

.bridge-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent-red);
  flex-shrink: 0;
}

.bridge-dot.connected {
  background: var(--accent-green);
  box-shadow: 0 0 6px rgba(76,175,80,0.6);
}

/* Responsive */
@media (max-width: 640px) {
  .top-bar { padding: 8px 12px; }
  .live-title { font-size: 14px; }
  .chat-area { padding: 14px 12px 10px; }
  .input-area { padding: 8px 12px 12px; }
  .msg { max-width: 92%; }
  .modal-panel { padding: 20px; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="live-badge">
    <div class="live-dot"></div>
    <span class="live-title">听泉赏宝 · 万物皆可鉴</span>
    <span class="live-subtitle">AI 蒸馏版</span>
    <span class="bridge-status" id="bridge-status"><span class="bridge-dot" id="bridge-dot"></span><span id="bridge-label">未连接</span></span>
  </div>
  <div class="top-bar-right">
    <div class="viewer-count">
      <svg class="viewer-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      <span id="viewer-num"></span>
      <div class="heat-bar"><div class="heat-fill"></div></div>
    </div>
    <div class="vol-controls">
      <button class="icon-btn" id="mute-btn" title="静音">&#x1f50a;</button>
      <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="30">
    </div>
    <button class="icon-btn" id="settings-btn" title="设置">&#x2699;</button>
  </div>
</div>

<!-- Danmaku Layer -->
<div class="danmaku-layer" id="danmaku-layer"></div>

<!-- Main Container -->
<div class="main-container">
  <div class="chat-area" id="chat-area"></div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <div class="img-preview-container" id="img-preview-container">
          <img class="img-preview-thumb" id="img-preview-thumb" src="" alt="preview">
          <button class="img-preview-remove" id="img-preview-remove">&times;</button>
        </div>
        <textarea id="chat-input" rows="1" placeholder="把东西拿过来吧兄弟..."></textarea>
      </div>
      <div class="action-btns">
        <button class="upload-btn" id="upload-btn" title="上传图片">&#x1f4f7;</button>
        <button class="send-btn" id="send-btn" title="发送">&#x27a4;</button>
      </div>
      <input type="file" id="file-input" accept="image/*">
    </div>
  </div>
</div>

<!-- Drop Overlay -->
<div class="drop-overlay" id="drop-overlay">
  <div class="drop-overlay-text">把图片拖到这里</div>
  <div class="drop-overlay-sub">松手即可上传鉴定</div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal-panel">
    <div class="modal-title">
      <span>API 设置</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="form-group">
      <label class="form-label">API Provider</label>
      <select class="form-select" id="api-provider">
        <option value="bridge">Claude Code 桥接</option>
        <option value="claude">Claude (Anthropic)</option>
        <option value="openai">OpenAI</option>
        <option value="custom">自定义 (OpenAI 兼容)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">API Key</label>
      <input type="password" class="form-input" id="api-key" placeholder="sk-...">
    </div>
    <div class="form-group">

function loadSettings() {
  return {
    provider: localStorage.getItem('tq_provider') || 'claude',

    model: localStorage.getItem('tq_model') || '',
    baseUrl: localStorage.getItem('tq_baseUrl') || '',

}

function saveSettings() {
  const prevProvider = localStorage.getItem('tq_provider') || 'claude';
  const provider = $('#api-provider').value;
  const apiKey = $('#api-key').value;
  const model = $('#api-model').value;
  const baseUrl = $('#api-base-url').value;
  localStorage.setItem('tq_provider', provider);
  localStorage.setItem('tq_apiKey', apiKey);
  localStorage.setItem('tq_model', model);
  localStorage.setItem('tq_baseUrl', baseUrl);
  settingsStatus.classList.add('show');
  setTimeout(() => settingsStatus.classList.remove('show'), 2000);

  // Handle mode switch
  if (provider !== prevProvider) {
    if (provider === 'bridge') {
      bridge.connect();
      chatInput.readOnly = true;
      chatInput.placeholder = '请在 Claude Code 终端中输入';
      sendBtn.disabled = true;
      uploadBtn.disabled = true;
      showToast('已切换到 Claude Code 桥接模式');

      bridge.disconnect();
      chatInput.readOnly = false;
      chatInput.placeholder = '把东西拿过来吧兄弟...';
      sendBtn.disabled = false;
      uploadBtn.disabled = false;
      if (prevProvider === 'bridge') {
        showToast('已切换到 API 直连模式');
      }
    }
  }
}

function populateSettings() {
  const s = loadSettings();
  $('#api-provider').value = s.provider;
  $('#api-key').value = s.apiKey;
  $('#api-model').value = s.model || getDefaultModel(s.provider);
  $('#api-base-url').value = s.baseUrl;

}

function getDefaultModel(provider) {
  if (provider === 'claude') return 'claude-sonnet-4-20250514';
  if (provider === 'openai') return 'gpt-4o';
  return '';
}

function toggleBaseUrl(provider) {
  const isBridge = provider === 'bridge';
  $('#base-url-group').style.display = provider === 'custom' ? 'block' : 'none';
  // Hide API key and model for bridge mode
  $('#api-key').closest('.form-group').style.display = isBridge ? 'none' : 'block';

// ========== Image Upload ==========

function handleImageFile(file) {
  if (!file.type.startsWith('image/')) {
    showToast('只支持图片文件');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const base64 = e.target.result;
    state.pendingImage = {
      base64: base64,
      mediaType: file.type,
    };
    imgPreviewThumb.src = base64;
    imgPreviewContainer.classList.add('active');
  };
  reader.readAsDataURL(file);
}

  dropOverlay.classList.remove('active');

});

// ========== Send ==========
chatInput.addEventListener('keydown', (e) => {

    e.preventDefault();
    handleSend();
  }
});

sendBtn.addEventListener('click', handleSend);

function handleSend() {
  if (state.streaming) return;
  const text = chatInput.value.trim();
  const hasImage = !!state.pendingImage;
  if (!text && !hasImage) return;

  const settings = loadSettings();

  // Bridge mode: input is disabled, but just in case
  if (settings.provider === 'bridge') {
    showToast('桥接模式下请在 Claude Code 终端中输入');
    return;
  }

  if (!settings.apiKey) {
    showToast('请先在设置中填写 API Key');
    settingsBtn.click();
    return;
  }

  // Build user message
  const userMsg = { role: 'user', content: text || '(发送了一张图片)' };
  const imageData = state.pendingImage ? { ...state.pendingImage } : null;

  // Display user message
  appendUserMessage(text, imageData);

  // Add to history
  if (imageData) {
    const b64data = imageData.base64.split(',')[1];
    if (settings.provider === 'claude') {
      userMsg.content = [
        { type: 'image', source: { type: 'base64', media_type: imageData.mediaType, data: b64data } },
      ];
      if (text) userMsg.content.push({ type: 'text', text: text });
    } else {
      userMsg.content = [];
      userMsg.content.push({ type: 'image_url', image_url: { url: imageData.base64 } });
      if (text) userMsg.content.push({ type: 'text', text: text });
    }
  }

  state.messages.push(userMsg);

  // Clear input
  chatInput.value = '';
  chatInput.style.height = 'auto';
  state.pendingImage = null;
  imgPreviewContainer.classList.remove('active');
  fileInput.value = '';

  // Stream response
  streamResponse(settings);
}

function appendUserMessage(text, imageData) {

    <div class="msg-avatar">你</div>

// ========== BGM ==========
// BGM paths: use /bgm/ when served from bridge, ../references/bgm/ when opened as file
function bgmPath(file) {
  if (location.port === '19100') return '/bgm/' + file;
  return '../references/bgm/' + file;
}
const BGM_MAP = {
  'Life Style': 'life_style.mp3',
  'life style': 'life_style.mp3',
  '春庭雪DJ版': 'chunting_xue_dj.mp3',
  '春庭雪DJ': 'chunting_xue_dj.mp3',
  '春庭雪': 'chunting_xue.mp3',
};

function playBGM(name) {
  let file = null;
  for (const [key, val] of Object.entries(BGM_MAP)) {
    if (name.includes(key)) {
      file = val;
      break;
    }
  }
  if (!file) return;

  const newAudio = new Audio(bgmPath(file));
  newAudio.volume = 0;
  newAudio.muted = state.muted;
  newAudio.loop = false;

  // Fade out current
  if (state.currentAudio) {
    const old = state.currentAudio;
    const fadeOut = setInterval(() => {
      if (old.volume > 0.05) {
        old.volume = Math.max(0, old.volume - 0.05);
      } else {
        old.pause();
        clearInterval(fadeOut);
      }
    }, 50);
  }

  // Play and fade in
  newAudio.play().catch(() => {});
  const fadeIn = setInterval(() => {
    if (newAudio.volume < state.volume - 0.05) {
      newAudio.volume = Math.min(state.volume, newAudio.volume + 0.05);
    } else {
      newAudio.volume = state.volume;
      clearInterval(fadeIn);
    }
  }, 50);

  state.currentAudio = newAudio;
}

// ========== Parse & Render Response ==========
function parseAndRender(rawText) {
  let text = rawText;
  const danmakus = [];
  const bgms = [];
  const expressions = [];

  // Extract [弹幕: xxx]
  text = text.replace(/\[弹幕[:：]\s*([^\]]+)\]/g, (_, d) => {
    danmakus.push(d.trim());
    return '';
  });

  // Extract [BGM:《xxx》] or [BGM: xxx]
  text = text.replace(/\[BGM[:：]\s*[《]?([^》\]]+)[》]?\s*\]/g, (_, b) => {
    bgms.push(b.trim());
    return '';
  });

  // Extract [表情: xxx] or common expression tags [垮脸] [眼睛放光] etc.
  text = text.replace(/\[表情[:：]\s*([^\]]+)\]/g, (_, e) => {
    expressions.push(e.trim());
    return '';
  });

  const expressionTags = {
    '垮脸': '02-kuai-lian.png',
    '侧脸质疑': '05-ce-lian-zhiyi.png',
    '眼睛放光': '03-eyes-bright.jpg',
    '推眼镜': '06-tui-yanjing.jpg',
    '记笔记': 'jibiji-01.jpg',
    '认真': '06c-serious-closeup.jpg',
    '震惊': 'shocked-youpiao-01.gif',
    '猫开门': '谷歌听泉猫开门-74.jpg',
    '按计算器中': 'jibiji-03.jpg',
    '揉头发': '04-nao-tou.jpg',
    '指着说开门': '04b-pointing-kaimen.jpg',
    '微笑': '03b-smile-portrait.jpg',
    '喝水': 'heshui-01.jpg',
    '结巴': 'shocked-youpiao-01.gif',
  };

  for (const [tag, file] of Object.entries(expressionTags)) {
    const regex = new RegExp('\\[' + tag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\]', 'g');
    text = text.replace(regex, () => {
      expressions.push(file);
      return '';
    });
  }

  // Fire danmakus
  danmakus.forEach((d, i) => {
    setTimeout(() => fireDanmaku(d), i * 600);
  });

  // Play BGM (last one wins)
  if (bgms.length > 0) {
    playBGM(bgms[bgms.length - 1]);
  }

  // Render HTML
  let html = '';

  // Process certificate blocks
  text = text.replace(/┌[─]+┐[\s\S]*?└[─]+┘/g, (certBlock) => {
    const isChendian = certBlock.includes('沉淀') || certBlock.includes('沉 淀');
    html += renderCertificate(certBlock, isChendian);
    return '';
  });

  // Render remaining text
  const lines = text.trim().split('\n');
  let textHtml = '';
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    textHtml += escapeHtml(trimmed) + '<br>';
  }

  // Insert expressions
  expressions.forEach((expr) => {
    const prefix = (location.port === '19100') ? '/expr/' : '../references/expressions/';
    const src = prefix + expr;
    textHtml += `<img class="expression-img" src="${src}" alt="${expr}" onerror="this.style.display='none'">`;
  });

  return textHtml + html;
}

function renderCertificate(block, isChendian) {
  const lines = block.split('\n').filter(l => l.trim());
  let bodyHtml = '';

  for (const line of lines) {
    let clean = line.replace(/[│┌┐└┘─├┤╔╗╚╝║═]/g, '').trim();
    if (!clean) continue;
    if (clean.includes('听泉赏宝') || clean.includes('鉴定证书') || clean.includes('沉 淀')) continue;

    // Key-value pairs
    const kvMatch = clean.match(/^(.+?)[:：]\s*(.+)$/);
    if (kvMatch) {
      bodyHtml += `<div><span class="label">${escapeHtml(kvMatch[1])}</span><span class="value">${escapeHtml(kvMatch[2])}</span></div>`;
    } else {
      bodyHtml += `<div class="value">${escapeHtml(clean)}</div>`;
    }
  }

  const cls = isChendian ? 'chendian' : 'kaimen';
  const title = isChendian ? '沉淀通知书' : '听泉赏宝 · 鉴定证书';
  const stamp = isChendian ? '沉淀' : '开门';

  let quoteText = '';
  const quoteMatch = block.match(/["""]([^"""]+)["""]/);
  if (quoteMatch) quoteText = quoteMatch[1];

  return `
    <div class="cert-card ${cls}">
      <div class="cert-header"><h3>${title}</h3></div>
      <div class="cert-body">${bodyHtml}</div>
      <div class="cert-stamp">${stamp}</div>
      <div class="cert-actions">
        ${quoteText ? `<button class="cert-btn" onclick="copyQuote(this, '${escapeHtml(quoteText).replace(/'/g, "\\'")}')">复制金句</button>` : ''}
        <button class="cert-btn" onclick="showToast('长按截图分享给好友')">截图分享</button>
      </div>
    </div>
  `;
}

function copyQuote(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制';
    setTimeout(() => { btn.textContent = '复制金句'; }, 1500);
  }).catch(() => {
    showToast('复制失败，请手动选中复制');
  });
}

// ========== API Streaming ==========
async function streamResponse(settings) {
  state.streaming = true;
  sendBtn.disabled = true;

  appendTypingIndicator();

  const provider = settings.provider;
  const apiKey = settings.apiKey;
  const model = settings.model || getDefaultModel(provider);

  let url, headers, body;

  if (provider === 'claude') {
    url = 'https://api.anthropic.com/v1/messages';
    headers = {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    };
    body = JSON.stringify({
      model: model,
      max_tokens: 4096,
      stream: true,
      system: SYSTEM_PROMPT,
      messages: state.messages,
    });
  } else {
    // OpenAI or custom
    const baseUrl = provider === 'custom'
      ? (settings.baseUrl || 'https://api.openai.com').replace(/\/$/, '')
      : 'https://api.openai.com';
    url = baseUrl + '/v1/chat/completions';
    headers = {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    };
    const msgs = [{ role: 'system', content: SYSTEM_PROMPT }, ...state.messages];
    body = JSON.stringify({
      model: model,
      max_tokens: 4096,
      stream: true,
      messages: msgs,
    });
  }

  state.abortController = new AbortController();

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: headers,
      body: body,
      signal: state.abortController.signal,
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`API Error ${resp.status}: ${errText.substring(0, 200)}`);
    }

    removeTypingIndicator();
    const streamTextEl = createStreamingMessage();
    let fullText = '';

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === 'data: [DONE]') continue;
        if (trimmed.startsWith('event:')) continue;
        if (!trimmed.startsWith('data:')) continue;

        try {
          const json = JSON.parse(trimmed.replace(/^data:\s*/, ''));
          let delta = '';

          if (provider === 'claude') {
            if (json.type === 'content_block_delta' && json.delta && json.delta.text) {
              delta = json.delta.text;
            }
          } else {
            if (json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content) {
              delta = json.choices[0].delta.content;
            }
          }

          if (delta) {
            fullText += delta;
            // Live render streaming text (simple, show raw while streaming)
            streamTextEl.textContent = fullText;
            scrollToBottom();
          }
        } catch (e) {
          // skip parse errors on partial chunks
        }
      }
    }

    // Final render with full parsing
    const streamingMsg = document.getElementById('streaming-msg');
    if (streamingMsg) {
      const contentEl = streamingMsg.querySelector('.msg-content');
      contentEl.innerHTML = parseAndRender(fullText);
      // Remove cursor
      const cursor = contentEl.querySelector('.stream-cursor');
      if (cursor) cursor.remove();
    }

    // Store assistant message
    state.messages.push({ role: 'assistant', content: fullText });

    scrollToBottom();

  } catch (err) {
    removeTypingIndicator();
    const streamingMsg = document.getElementById('streaming-msg');
    if (streamingMsg) streamingMsg.remove();

    if (err.name === 'AbortError') {
      showToast('已取消');
    } else {
      const errDiv = document.createElement('div');
      errDiv.className = 'msg assistant';
      errDiv.innerHTML = `
        <div class="msg-avatar">泉</div>
        <div class="msg-content" style="color: var(--accent-red);">
          连接出了问题：${escapeHtml(err.message)}<br>
          <small style="color: var(--text-muted);">检查一下 API 设置，点右上角齿轮</small>
        </div>
      `;
      chatArea.appendChild(errDiv);
      scrollToBottom();
    }
  } finally {
    state.streaming = false;
    sendBtn.disabled = false;
    state.abortController = null;
  }
}

// ========== SSE Bridge ==========
const bridge = {
  eventSource: null,
  connected: false,

  connect() {
    const statusEl = $('#bridge-status');
    const dotEl = $('#bridge-dot');
    const labelEl = $('#bridge-label');
    statusEl.classList.add('active');

    // Determine SSE URL — if page is served from bridge, use same origin; otherwise localhost
    const baseUrl = (location.port === '19100') ? '' : 'http://localhost:19100';
    const url = baseUrl + '/events';

    if (this.eventSource) {
      this.eventSource.close();
    }

    const es = new EventSource(url);
    this.eventSource = es;

    es.addEventListener('connected', (e) => {
      this.connected = true;
      dotEl.classList.add('connected');
      labelEl.textContent = '已连接';
      log.info('Bridge SSE connected');
    });

    es.addEventListener('message', (e) => {
      try {
        const data = JSON.parse(e.data);
        this.onMessage(data);
      } catch (err) {
        log.error('Bridge parse error:', err);
      }
    });

    es.onerror = () => {
      this.connected = false;
      dotEl.classList.remove('connected');
      labelEl.textContent = '未连接';
      // EventSource will auto-reconnect
    };
  },

  disconnect() {
    if (this.eventSource) {
      this.eventSource.close();
      this.eventSource = null;
    }
    this.connected = false;
    const statusEl = $('#bridge-status');
    const dotEl = $('#bridge-dot');
    const labelEl = $('#bridge-label');
    dotEl.classList.remove('connected');
    labelEl.textContent = '未连接';
    statusEl.classList.remove('active');
  },

  onMessage(data) {
    const { role, content } = data;
    if (!content) return;

    if (role === 'user') {
      appendUserMessage(content, null);
      state.messages.push({ role: 'user', content });
    } else {
      // Assistant message — render with full parsing (danmaku, BGM, expressions, certs)
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg assistant';
      msgDiv.innerHTML = `
        <div class="msg-avatar">泉</div>
        <div class="msg-content">${parseAndRender(content)}</div>
      `;
      chatArea.appendChild(msgDiv);
      state.messages.push({ role: 'assistant', content });
    }
    scrollToBottom();
  },
};

// Simple log helper
const log = {
  info: (...args) => console.log('[听泉]', ...args),
  error: (...args) => console.error('[听泉]', ...args),
};

// ========== Auto-open greeting ==========
function sendGreeting() {
  const settings = loadSettings();
  const isBridge = settings.provider === 'bridge';

  if (isBridge) {
    // Bridge mode: connect SSE, show waiting message
    bridge.connect();
    chatInput.readOnly = true;
    chatInput.placeholder = '请在 Claude Code 终端中输入';
    sendBtn.disabled = true;
    uploadBtn.disabled = true;

    const welcomeDiv = document.createElement('div');
    welcomeDiv.className = 'msg assistant';
    welcomeDiv.innerHTML = `
      <div class="msg-avatar">泉</div>
      <div class="msg-content">
        各位兄弟们晚上好，我是听泉。<br><br>
        <span style="color: var(--text-muted); font-size: 13px;">
          已切换到 Claude Code 桥接模式。<br>
          请确保 bridge.py 已启动 (python3 bridge.py)，<br>
          然后在 Claude Code 终端中开始鉴宝对话。
        </span>
      </div>
    `;
    chatArea.appendChild(welcomeDiv);

    setTimeout(() => fireDanmaku('来了来了'), 500);
    setTimeout(() => fireDanmaku('等泉哥连线'), 1200);
    setTimeout(() => fireDanmaku('桥接模式！'), 2000);
    return;
  }

  // Non-bridge mode: restore normal input
  bridge.disconnect();
  chatInput.readOnly = false;
  chatInput.placeholder = '把东西拿过来吧兄弟...';
  sendBtn.disabled = false;
  uploadBtn.disabled = false;

  if (!settings.apiKey) {
    const welcomeDiv = document.createElement('div');
    welcomeDiv.className = 'msg assistant';
    welcomeDiv.innerHTML = `
      <div class="msg-avatar">泉</div>
      <div class="msg-content">
        各位兄弟们晚上好，我是听泉。<br><br>
        <span style="color: var(--text-muted); font-size: 13px;">
          点击右上角 &#x2699; 设置你的 API Key，就可以开始鉴宝了。<br>
          支持 Claude Code 桥接 / Claude / OpenAI / 自定义 API。
        </span>
      </div>
    `;
    chatArea.appendChild(welcomeDiv);

    setTimeout(() => fireDanmaku('来了来了'), 500);
    setTimeout(() => fireDanmaku('泉哥好'), 1200);
    setTimeout(() => fireDanmaku('今晚有猛货吗'), 2000);
    return;
  }

  // Auto-send opening — silent trigger, no user bubble shown
  state.messages.push({ role: 'user', content: '(用户进入直播间)' });

  // Fire welcome danmaku
  setTimeout(() => fireDanmaku('来了来了'), 500);
  setTimeout(() => fireDanmaku('泉哥好'), 1200);
  setTimeout(() => fireDanmaku('今晚有猛货吗'), 2000);

  streamResponse(settings);
}

// ========== Init ==========
populateSettings();
sendGreeting();
